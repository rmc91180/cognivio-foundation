version: "3.8"

services:
  mongo:
    image: mongo:7.0
    container_name: cognivio-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cognivio-api
    command: sh -c "VIDEO_WORKER_COUNT=0 VIDEO_TRANSCODE_WORKER_COUNT=0 PRIVACY_WORKER_COUNT=0 uvicorn server:app --host 0.0.0.0 --port 8000"
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: cognivio
      VIDEO_WORKER_COUNT: "0"
      VIDEO_TRANSCODE_WORKER_COUNT: "0"
      PRIVACY_WORKER_COUNT: "0"
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cognivio-video-worker
    command: sh -c "VIDEO_WORKER_COUNT=3 python worker_entrypoint.py"
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: cognivio
      VIDEO_WORKER_COUNT: "3"
      VIDEO_TRANSCODE_WORKER_COUNT: "1"
      PRIVACY_WORKER_COUNT: "1"
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cognivio-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  mongo_data:
