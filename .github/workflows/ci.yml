name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Run backend tests
        env:
          PYTHONPATH: backend
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: cognivio_test
          JWT_SECRET: test-jwt-secret
          BACKEND_PUBLIC_BASE_URL: https://api.example.com
          FRONTEND_URL: https://www.example.com
        run: python -m pytest backend/tests -q

  frontend-tests-and-build:
    name: Frontend Tests and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        env:
          CI: true
        run: |
          if npm run | grep -q " test"; then
            npm test -- --watchAll=false
          else
            echo "No frontend test script configured; skipping tests."
          fi

      - name: Build frontend
        working-directory: frontend
        env:
          CI: false
        run: npm run build

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Python syntax check
        env:
          PYTHONPATH: backend
        run: |
          python -m py_compile backend/server.py
          python -m compileall -q backend/app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint if configured
        working-directory: frontend
        run: |
          if npm run | grep -q " lint"; then
            npm run lint
          else
            echo "No frontend lint script configured; passing lint check."
          fi
