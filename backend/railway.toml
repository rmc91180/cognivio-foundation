[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# Build-truth (GET /__build): Railway's railway.toml [build] does NOT support
# passing Docker --build-arg values, so GIT_SHA cannot be injected at image
# build time from here. Instead set GIT_SHA as a SERVICE VARIABLE on each
# service (api + worker), value: ${{ RAILWAY_GIT_COMMIT_SHA }}. At runtime that
# overrides the Dockerfile's ENV GIT_SHA default ("unknown"), so /__build
# reports the real deployed commit.

[deploy]
restartPolicyType = "ON_FAILURE"

[[services]]
name = "api"
startCommand = "sh -c 'VIDEO_WORKER_COUNT=0 VIDEO_TRANSCODE_WORKER_COUNT=0 PRIVACY_WORKER_COUNT=0 uvicorn server:app --host 0.0.0.0 --port ${PORT:-8080}'"

[[services]]
name = "worker"
startCommand = "sh -c 'VIDEO_WORKER_COUNT=${VIDEO_WORKER_COUNT:-3} python worker_entrypoint.py'"
